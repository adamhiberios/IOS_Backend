# =============================================================================
# IOS LMS — Local Development Stack
#
# Usage:
#   docker compose up              # start everything (API hot-reloads)
#   docker compose up -d           # detached
#   docker compose down            # stop and remove containers
#   docker compose down -v         # also remove volumes (wipes DB!)
#
#   docker compose exec api npm test
#   docker compose exec api npm run migration:run
#   docker compose exec api npm run migration:revert
#   docker compose exec postgres psql -U ios -d ios_lms
#   docker compose logs -f api
#
# Service URLs (from host):
#   API             http://localhost:3000
#   Swagger         http://localhost:3000/api/docs
#   Postgres        localhost:5432  (user: ios, pass: iospass, db: ios_lms)
#   Redis           localhost:6379
#   Adminer (DB)    http://localhost:8080
#   MinIO (S3 API)  http://localhost:9000
#   MinIO Console   http://localhost:9001 (login: minioadmin / minioadmin)
# =============================================================================

name: ios-lms

services:
  # ─── PostgreSQL 15 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ios-lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iospass}
      POSTGRES_DB: ${POSTGRES_DB:-ios_lms}
      # Faster fsync for dev. Production uses Managed Postgres (different settings).
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # init.sql runs once on first start to install required extensions
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ios} -d ${POSTGRES_DB:-ios_lms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ios-lms-net

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ios-lms-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ios-lms-net

  # ─── MinIO (S3-compatible object storage for dev) ─────────────────────────
  # Stands in for DigitalOcean Spaces in dev. Same S3 API, same SDK call sites,
  # same signed-URL semantics — switching to real DO Spaces is a pure env swap
  # (DO_SPACES_ENDPOINT, KEY, SECRET, and DO_SPACES_PUBLIC_URL).
  minio:
    image: minio/minio:latest
    container_name: ios-lms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ios-lms-net

  # ─── MinIO bucket initialiser (runs once, exits) ──────────────────────────
  # Idempotently creates the three buckets used by the StorageService and sets
  # the right anonymous-access policy on each:
  #   ios-lms-certificates  → public-read (cert PDFs are linkable by URL)
  #   ios-lms-media         → private (authenticated avatar/thumbnail downloads)
  #   ios-lms-videos        → private (lesson video streaming via signed URLs)
  # API service waits for this to complete before starting.
  minio-init:
    image: minio/mc:latest
    container_name: ios-lms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/ios-lms-certificates
        mc mb --ignore-existing local/ios-lms-media
        mc mb --ignore-existing local/ios-lms-videos
        mc anonymous set download local/ios-lms-certificates
        mc anonymous set none     local/ios-lms-media
        mc anonymous set none     local/ios-lms-videos
        echo "MinIO buckets ready: certificates(public) media(private) videos(private)"
    networks:
      - ios-lms-net
    restart: "no"

  # ─── NestJS API (hot-reload dev) ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ios-lms-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${PORT:-3000}:3000"
      - "${WS_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      PORT: 3000
      WS_PORT: 3001
      # File watching across the Docker volume mount needs polling on Windows
      # and macOS hosts. Linux can use native fsevents but polling is safe
      # everywhere. CPU cost is minimal at 1s interval.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ios}:${POSTGRES_PASSWORD:-iospass}@postgres:5432/${POSTGRES_DB:-ios_lms}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-development-only-jwt-access-secret-min-64-chars-replace-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-development-only-jwt-refresh-secret-different-from-access-secret-here}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_mock}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_mock}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-SG.mock}
      # ── Storage (dev: MinIO; prod: swap to DO Spaces) ──────────────────
      # ENDPOINT is the address the API uses (docker-network for dev).
      # PUBLIC_URL is what we hand back to clients (browser-accessible). They
      # differ in dev because minio:9000 isn't resolvable from the browser;
      # in prod both point at the same DO Spaces hostname.
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-http://minio:9000}
      DO_SPACES_PUBLIC_URL: ${DO_SPACES_PUBLIC_URL:-http://localhost:9000}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-us-east-1}
      DO_SPACES_KEY: ${DO_SPACES_KEY:-minioadmin}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET:-minioadmin}
      DO_SPACES_BUCKET_CERTIFICATES: ${DO_SPACES_BUCKET_CERTIFICATES:-ios-lms-certificates}
      DO_SPACES_BUCKET_MEDIA: ${DO_SPACES_BUCKET_MEDIA:-ios-lms-media}
      DO_SPACES_BUCKET_VIDEOS: ${DO_SPACES_BUCKET_VIDEOS:-ios-lms-videos}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-en}
      SUPPORTED_LOCALES: ${SUPPORTED_LOCALES:-en,tr,fr,es,ar,de}
    volumes:
      # Mount source for hot reload. node_modules stays in-container.
      - ./src:/app/src
      - ./test:/app/test
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.build.json:/app/tsconfig.build.json
      - ./nest-cli.json:/app/nest-cli.json
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./coverage:/app/coverage
    networks:
      - ios-lms-net

  # ─── Adminer (Postgres GUI) ───────────────────────────────────────────────
  # Removable. Useful during dev to inspect tables. Login: server=postgres,
  # user=ios, password=iospass, db=ios_lms.
  adminer:
    image: adminer:4.8.1
    container_name: ios-lms-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - ios-lms-net

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  ios-lms-net:
    driver: bridge

# ─── Volumes ────────────────────────────────────────────────────────────────
# Named volumes survive `docker compose down` but are wiped by `down -v`.
volumes:
  postgres-data:
  redis-data:
  minio-data:
