<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset your password — Institute of Scrum</title>
  <style>
    *,*:before,*:after{box-sizing:border-box}
    body{margin:0;padding:0;background:#f5f5f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#1f1f1f;}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{width:100%;max-width:520px;background:#fff;border:1px solid #e5e5e5;box-shadow:0 2px 24px rgba(0,0,0,.04);}
    .head{background:#7A1A1A;padding:28px 32px;color:#fff;}
    .wordmark{font-family:Georgia,'Times New Roman',serif;font-size:13px;letter-spacing:3px;line-height:1.3;}
    .body{padding:40px 32px 32px;}
    h1{margin:0 0 8px;font-family:Georgia,'Times New Roman',serif;font-size:28px;line-height:34px;font-weight:400;}
    .lede{margin:0 0 24px;font-size:14px;line-height:22px;color:#6b7280;}
    label{display:block;margin-bottom:6px;font-size:12px;font-weight:700;color:#1f1f1f;text-transform:uppercase;letter-spacing:1px;}
    input[type=password]{display:block;width:100%;padding:12px 14px;border:1.5px solid #e5e5e5;background:#fff;font-size:15px;color:#1f1f1f;font-family:inherit;}
    input[type=password]:focus{outline:none;border-color:#7A1A1A;}
    .field{margin-bottom:20px;}
    .hint{margin-top:6px;font-size:12px;color:#6b7280;}
    .btn{display:inline-block;width:100%;padding:14px;background:#7A1A1A;color:#fff;font-size:14px;font-weight:600;letter-spacing:.3px;border:none;cursor:pointer;}
    .btn:hover{background:#5C1314;}
    .err{background:#fef2f2;border-left:3px solid #B33A3A;color:#1f1f1f;padding:12px 14px;font-size:13px;line-height:19px;margin:0 0 20px;}
    .footer{background:#1f1f1f;color:#9ca3af;padding:20px 32px;font-size:12px;line-height:18px;}
    .footer-wordmark{font-family:Georgia,'Times New Roman',serif;color:#fff;font-size:11px;letter-spacing:2.5px;line-height:1.3;margin-bottom:8px;}
    @media (max-width:480px){.body{padding:32px 24px 24px}h1{font-size:24px;line-height:30px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div class="wordmark">INSTITUTE<br>OF SCRUM</div>
      </div>
      <div class="body">
        <h1>Set a new password</h1>
        <p class="lede">Pick something strong. Minimum 8 characters with upper + lower + digit + special character.</p>
        {{#if error}}<div class="err">{{error}}</div>{{/if}}
        <form method="POST" action="/reset-password" autocomplete="off">
          <input type="hidden" name="token" value="{{token}}">
          <div class="field">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" name="newPassword" required minlength="8" autofocus>
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm new password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8">
          </div>
          <button type="submit" class="btn">Reset password</button>
        </form>
      </div>
      <div class="footer">
        <div class="footer-wordmark">INSTITUTE OF SCRUM</div>
        © {{currentYear}} Institute of Scrum. All rights reserved.
      </div>
    </div>
  </div>
</body>
</html>
