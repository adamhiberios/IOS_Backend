# =============================================================================
# IOS LMS — Production Override
#
# This file overlays on top of docker-compose.yml and switches the API to the
# production Dockerfile (no hot reload, no source mount, multi-stage build).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Note: this is for SELF-HOSTED production / single-Droplet deployment.
# When we move to managed DigitalOcean services (Managed PG, Managed Redis),
# the postgres + redis services here become unused — only the api service runs,
# pointed at the managed instances via DATABASE_URL / REDIS_URL env vars.
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: always
    environment:
      NODE_ENV: production
    # No source volumes in production — code is baked into the image
    volumes: []
    # Production resource limits — adjust based on Droplet size
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  postgres:
    # In production with Managed Postgres, you'd remove this service entirely
    # and point DATABASE_URL at the managed instance instead.
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # Adminer is not for production. Override removes it from the running stack.
  adminer:
    profiles:
      - never
