# =============================================================================
# Redis config for IOS LMS
#
# Critical setting: notify-keyspace-events Ex
#   - "E" = enable keyspace events
#   - "x" = expired events
# This is what powers exam-session auto-submit (BE-036, Week 4): when a
# session's TTL hits zero, Redis publishes an expiration event that our
# NestJS RedisModule subscribes to and dispatches to the keyspace handler.
# =============================================================================

# Networking — bind all interfaces inside the container.
bind 0.0.0.0
protected-mode no
port 6379

# Persistence — use AOF for durability of exam-in-flight sessions.
# Test sessions are also mirrored in Postgres, so this is defence-in-depth.
appendonly yes
appendfsync everysec

# Keyspace notifications — REQUIRED for exam session auto-expiry handling.
notify-keyspace-events Ex

# Memory management — eviction policy. Sessions have explicit TTLs so we
# should never hit the limit, but in case of misconfiguration, evict the
# least-recently-used volatile keys first.
maxmemory-policy allkeys-lru
