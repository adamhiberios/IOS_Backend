# =============================================================================
# Test DB override — points the API at ios_lms_test.
#
# Usage:
#   # 1. Run integration tests first to create & migrate ios_lms_test:
#   docker compose exec api npm run test:integration
#
#   # 2. Start the stack against the test DB:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up
#
# The ios admin role is used here (full access, bypasses RLS) so you can
# freely inspect all test data. The tests themselves run as ios_lms_app
# (NOBYPASSRLS) to exercise row-level security policies.
# =============================================================================

services:
  api:
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://ios:iospass@postgres:5432/ios_lms_test
