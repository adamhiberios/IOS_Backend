# =============================================================================
# IOS LMS — DigitalOcean Droplet deployment
#
# This compose file runs ONLY the api container on the Droplet.
# Postgres, Redis (Valkey), and object storage are all DigitalOcean managed
# services — the api connects to them over the VPC private network.
#
# Lives at /opt/ios-lms/docker-compose.yml on the Droplet.
#
# Reads ./env from the same directory. That .env file is created once by hand
# (NOT committed) and contains all secrets + the GHCR image tag.
#
# Deploy lifecycle (from GitHub Actions):
#   docker login ghcr.io ...
#   docker compose pull
#   docker compose up -d
# =============================================================================

services:
  api:
    image: ${API_IMAGE:?API_IMAGE must be set, e.g. ghcr.io/<owner>/ios-lms-api:latest}
    container_name: ios-lms-api
    restart: always
    # Pull all config from the .env file next to this compose file.
    env_file:
      - ./.env
    # Bind to host port 3000. No reverse proxy yet — the Droplet firewall
    # decides who can reach it. When you add a domain + TLS later, switch
    # this to 127.0.0.1:3000 and let Caddy/Nginx terminate TLS in front.
    ports:
      - "3000:3000"
    # Resource limits sized for a basic Droplet. Tune up if you upgrade.
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
