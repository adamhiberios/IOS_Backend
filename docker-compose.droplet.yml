# =============================================================================
# IOS LMS — DigitalOcean Droplet deployment (parameterized for multi-env)
#
# Lives at /opt/ios-lms/<env>/docker-compose.yml on the Droplet, one per env
# (prod, dev). Each env has its own sibling .env file that supplies:
#
#   APP_ENV         e.g. 'prod' or 'dev' (cosmetic — labels containers, etc.)
#   HOST_PORT       host port to bind (3000 for prod, 3001 for dev)
#   API_IMAGE       full GHCR image reference (set/updated by deploy workflow)
#   plus all the app env vars (DATABASE_URL, REDIS_URL, JWT_SECRET, ...)
#
# Deploy commands (run from /opt/ios-lms/<env>/):
#   docker compose -p ios-lms-${APP_ENV} pull
#   docker compose -p ios-lms-${APP_ENV} up -d
#
# The `-p` project flag namespaces the stack so prod and dev coexist on the
# same Droplet without colliding on networks, volumes, or container names.
# =============================================================================

services:
  api:
    image: ${API_IMAGE:?API_IMAGE must be set, e.g. ghcr.io/<owner>/ios-lms-api:sha-xxxxx}
    container_name: ios-lms-api-${APP_ENV:?APP_ENV must be set (prod|dev)}
    restart: always
    env_file:
      - ./.env
    # Bind to host LOOPBACK only — Caddy (host networking) is the only thing
    # that needs to reach this port. Public traffic comes in via Cloudflare
    # → Caddy → 127.0.0.1:<HOST_PORT> → container :3000. Binding to 127.0.0.1
    # closes off direct internet hits even if UFW is misconfigured.
    ports:
      - "127.0.0.1:${HOST_PORT:?HOST_PORT must be set}:3000"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
